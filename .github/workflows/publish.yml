name: 'Publish Release'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'windows-latest'
            args: ''
          - platform: 'ubuntu-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      CARGO_INCREMENTAL: 0
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm' # Automatically caches node_modules in the runner

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust Caching
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install system dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build and Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # tauri-action automatically replaces this with version from tauri.conf.json
          releaseName: 'v__VERSION__'
          releaseBody: 'Automated release of Acoustic Session companion app.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Show build output
        run: |
          echo '--- target/release ---'
          ls -la src-tauri/target/release || true
          echo '--- bundle ---'
          ls -la src-tauri/target/release/bundle || true

      - name: Get version
        id: get_version
        run: |
          VERSION=$(node -e "console.log(require('./src-tauri/tauri.conf.json').version)")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - name: Normalize bundle name
        id: rename_bundle
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const workspace = process.env.GITHUB_WORKSPACE || '.';
          const version = process.env.VERSION || 'unknown';
          const runnerOs = process.env.RUNNER_OS || process.env.RUNNER || '';
          let system = 'unknown';
          if (/mac/i.test(runnerOs)) system = 'macos-universal';
          else if (/win/i.test(runnerOs)) system = 'windows-x86_64';
          else if (/linux/i.test(runnerOs)) system = 'linux-x86_64';

          const bundleDir = path.join(workspace, 'src-tauri', 'target', 'release', 'bundle');
          const out = process.env.GITHUB_OUTPUT;
          if (!fs.existsSync(bundleDir)) {
            fs.appendFileSync(out, `RESULT=no-bundle-dir:${bundleDir}\n`);
            console.log('no-bundle-dir:'+bundleDir);
            process.exit(0);
          }
          const entries = fs.readdirSync(bundleDir).filter(e => !e.startsWith('.'));
          if (entries.length === 0) {
            fs.appendFileSync(out, `RESULT=no-bundles-found:${bundleDir}\n`);
            console.log('no-bundles-found:'+bundleDir);
            process.exit(0);
          }

          const preferredExts = ['dmg','AppImage','deb','msi','exe','zip','pkg','tar.gz','tar.xz'];
          let picked = null;
          for (const e of entries) {
            const full = path.join(bundleDir, e);
            const stat = fs.statSync(full);
            if (stat.isFile()) {
              const lower = e.toLowerCase();
              for (const pe of preferredExts) if (lower.endsWith(pe.toLowerCase())) { picked = full; break; }
              if (picked) break;
            }
          }
          if (!picked) {
            for (const e of entries) {
              const full = path.join(bundleDir, e);
              if (fs.statSync(full).isFile()) { picked = full; break; }
            }
          }
          if (!picked) {
            for (const e of entries) {
              const full = path.join(bundleDir, e);
              if (fs.statSync(full).isDirectory()) { picked = full; break; }
            }
          }
          if (!picked) {
            fs.appendFileSync(out, `RESULT=no-valid-bundle:${bundleDir}\n`);
            console.log('no-valid-bundle:'+bundleDir);
            process.exit(0);
          }

          const ext = path.extname(picked).replace(/^[.]/, '') || '';
          const safeExt = ext === '' && fs.statSync(picked).isDirectory() ? '' : `.${ext}`;
          const newName = `acoustic_companion-${version}-${system}${safeExt}`;
          const dest = path.join(workspace, newName);
          try {
            if (fs.statSync(picked).isFile()) {
              fs.renameSync(picked, dest);
              fs.appendFileSync(out, `RESULT=${dest}\n`);
              console.log('Renamed to '+dest);
              process.exit(0);
            } else {
              fs.appendFileSync(out, `RESULT=${picked}\n`);
              console.log('Directory bundle at '+picked);
              process.exit(0);
            }
          } catch (err) {
            fs.appendFileSync(out, `RESULT=error:${err.message}\n`);
            console.log('error:'+err.message);
            process.exit(0);
          }
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        shell: bash

      - name: Upload renamed artifact
        if: ${{ !startsWith(steps.rename_bundle.outputs.RESULT, 'no-') && !startsWith(steps.rename_bundle.outputs.RESULT, 'error:') }}
        uses: actions/upload-artifact@v4
        with:
          name: acoustic_companion-${{ steps.get_version.outputs.VERSION }}-${{ matrix.platform }}
          path: ${{ steps.rename_bundle.outputs.RESULT }}
