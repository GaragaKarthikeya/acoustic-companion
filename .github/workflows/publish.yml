name: 'Publish Release'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'windows-2025'
            args: ''
          - platform: 'ubuntu-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      CARGO_INCREMENTAL: 0
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm' # Automatically caches node_modules in the runner

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust Caching
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install system dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build and Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUNDLER_DMG_IGNORE_CI: ${{ matrix.platform == 'macos-latest' && 'true' || '' }}
        with:
          tagName: v__VERSION__ # tauri-action automatically replaces this with version from tauri.conf.json
          releaseName: 'v__VERSION__'
          releaseBody: 'Automated release of Acoustic Session companion app.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Show build output
        run: |
          echo '--- target/release ---'
          ls -la src-tauri/target/release || true
          echo '--- bundle ---'
          ls -la src-tauri/target/release/bundle || true
        shell: bash

      - name: Get version
        id: get_version
        run: |
          VERSION=$(node -e "console.log(require('./src-tauri/tauri.conf.json').version)")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - name: Normalize bundle names
        id: rename_bundles
        run: |
          set -euo pipefail
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          BUNDLE_DIR="src-tauri/target/release/bundle"
          DIST_DIR="dist"

          case "${RUNNER_OS}" in
            macOS) SYSTEM="macos-universal" ;;
            Windows) SYSTEM="windows-x86_64" ;;
            Linux) SYSTEM="linux-x86_64" ;;
            *) SYSTEM="unknown" ;;
          esac

          rm -rf "${DIST_DIR}"
          mkdir -p "${DIST_DIR}"

          if [ ! -d "${BUNDLE_DIR}" ]; then
            echo "RESULT=no-bundle-dir:${BUNDLE_DIR}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t FILES < <(find "${BUNDLE_DIR}" -type f \( \
            -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.msi" -o \
            -name "*setup.exe" -o -name "*.exe" -o -name "*.app.tar.gz" -o -name "*.zip" -o -name "*.pkg" \
          \))

          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "RESULT=no-bundles-found:${BUNDLE_DIR}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for SRC in "${FILES[@]}"; do
            BASE="$(basename "${SRC}")"
            EXT=""
            KIND=""

            case "${BASE}" in
              *.app.tar.gz)
                EXT="tar.gz"
                KIND="updater"
                ;;
              *setup.exe)
                EXT="exe"
                KIND="setup"
                ;;
              *)
                EXT="${BASE##*.}"
                KIND="$(echo "${EXT}" | tr '[:upper:]' '[:lower:]')"
                ;;
            esac

            DEST="${DIST_DIR}/acoustic_companion-${VERSION}-${SYSTEM}-${KIND}.${EXT}"
            cp "${SRC}" "${DEST}"
            echo "Prepared ${DEST}"
          done

          echo "RESULT=${DIST_DIR}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Replace release assets with normalized names
        if: ${{ !startsWith(steps.rename_bundles.outputs.RESULT, 'no-') && !startsWith(steps.rename_bundles.outputs.RESULT, 'error:') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v${{ steps.get_version.outputs.VERSION }}"

          # Remove tauri-action default asset names so release has only normalized names.
          while IFS= read -r ASSET; do
            [ -n "${ASSET}" ] || continue
            gh release delete-asset "${TAG}" "${ASSET}" --yes || true
          done < <(gh release view "${TAG}" --json assets --jq '.assets[].name')

          gh release upload "${TAG}" dist/* --clobber
        shell: bash

      - name: Upload normalized artifacts
        if: ${{ !startsWith(steps.rename_bundles.outputs.RESULT, 'no-') && !startsWith(steps.rename_bundles.outputs.RESULT, 'error:') }}
        uses: actions/upload-artifact@v7
        with:
          name: acoustic_companion-${{ steps.get_version.outputs.VERSION }}-${{ matrix.platform }}
          path: ${{ steps.rename_bundles.outputs.RESULT }}/*
