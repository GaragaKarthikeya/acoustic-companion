name: 'Publish Release'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'windows-latest'
            args: ''
          - platform: 'ubuntu-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      CARGO_INCREMENTAL: 0
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm' # Automatically caches node_modules in the runner

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust Caching
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install system dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build and Publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # tauri-action automatically replaces this with version from tauri.conf.json
          releaseName: 'v__VERSION__'
          releaseBody: 'Automated release of Acoustic Session companion app.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Get version
        id: get_version
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            return cfg.version;

      - name: Normalize bundle name
        id: rename_bundle
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const workspace = process.env.GITHUB_WORKSPACE || '.';
            const runnerOs = process.env.RUNNER_OS || process.env.RUNNER || '';
            const version = '${{ steps.get_version.outputs.result }}';
            // Map runner OS to our system labels
            let system = 'unknown';
            if (runnerOs.toLowerCase().includes('mac')) system = 'macos-universal';
            else if (runnerOs.toLowerCase().includes('windows')) system = 'windows-x86_64';
            else if (runnerOs.toLowerCase().includes('linux')) system = 'linux-x86_64';

            const bundleDir = path.join(workspace, 'src-tauri', 'target', 'release', 'bundle');
            if (!fs.existsSync(bundleDir)) return `no-bundle-dir:${bundleDir}`;
            const entries = fs.readdirSync(bundleDir).filter(e => !e.startsWith('.'));
            if (entries.length === 0) return `no-bundles-found:${bundleDir}`;

            // prefer common installer extensions
            const preferredExts = ['dmg','AppImage','deb','msi','exe','zip','pkg','tar.gz','tar.xz'];
            let picked = null;
            for (const e of entries) {
              const full = path.join(bundleDir, e);
              const stat = fs.statSync(full);
              if (stat.isFile()) {
                const lower = e.toLowerCase();
                for (const pe of preferredExts) if (lower.endsWith(pe.toLowerCase())) { picked = full; break; }
                if (picked) break;
              }
            }
            if (!picked) {
              // fallback to first file
              for (const e of entries) {
                const full = path.join(bundleDir, e);
                if (fs.statSync(full).isFile()) { picked = full; break; }
              }
            }
            // if still not picked, use first directory (e.g., .app)
            if (!picked) {
              for (const e of entries) {
                const full = path.join(bundleDir, e);
                if (fs.statSync(full).isDirectory()) { picked = full; break; }
              }
            }
            if (!picked) return `no-valid-bundle:${bundleDir}`;

            const ext = path.extname(picked).replace(/^[.]/, '') || '';
            const safeExt = ext === '' && fs.statSync(picked).isDirectory() ? '' : `.${ext}`;
            const newName = `acoustic_companion-${version}-${system}${safeExt}`;
            const dest = path.join(workspace, newName);

            try {
              // for files, move/rename into workspace with new name; for dirs, leave in place and return path
              if (fs.statSync(picked).isFile()) {
                fs.renameSync(picked, dest);
                return dest;
              } else {
                // directory: return original path (upload will upload the folder)
                return picked;
              }
            } catch (err) {
              return `error:${err.message}`;
            }

      - name: Upload renamed artifact
        uses: actions/upload-artifact@v4
        with:
          name: acoustic_companion-${{ steps.get_version.outputs.result }}-${{ matrix.platform }}
          path: ${{ steps.rename_bundle.outputs.result }}
