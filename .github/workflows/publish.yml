name: 'Publish Release'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'windows-2025'
            args: ''
          - platform: 'ubuntu-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      CARGO_INCREMENTAL: 0
      RUST_BACKTRACE: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust Caching
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install system dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUNDLER_DMG_IGNORE_CI: ${{ matrix.platform == 'macos-latest' && 'true' || '' }}
        with:
          # By omitting tagName, tauri-action ONLY builds and DOES NOT try to upload to GitHub Releases
          args: ${{ matrix.args }}

      - name: Get version
        id: get_version
        run: |
          VERSION=$(node -e "console.log(require('./src-tauri/tauri.conf.json').version)")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - name: Normalize bundle names
        id: rename_bundles
        run: |
          set -euo pipefail
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          BUNDLE_DIR="src-tauri/target/release/bundle"
          DIST_DIR="dist"

          case "${RUNNER_OS}" in
            macOS) SYSTEM="macos-universal" ;;
            Windows) SYSTEM="windows-x86_64" ;;
            Linux) SYSTEM="linux-x86_64" ;;
            *) SYSTEM="unknown" ;;
          esac

          rm -rf "${DIST_DIR}"
          mkdir -p "${DIST_DIR}"

          if [ ! -d "${BUNDLE_DIR}" ]; then
            echo "RESULT=no-bundle-dir:${BUNDLE_DIR}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FOUND=0
          # Read null-terminated output from find (safe for Bash 3.2 and spaces in paths)
          while IFS= read -r -d '' SRC; do
            FOUND=1
            BASE="$(basename "${SRC}")"
            SUFFIX=""
            EXT=""

            case "${BASE}" in
              *.app.tar.gz) 
                SUFFIX="-updater"
                EXT="tar.gz" 
                ;;
              *setup.exe) 
                SUFFIX="-setup"
                EXT="exe" 
                ;;
              *) 
                SUFFIX=""
                EXT="${BASE##*.}" 
                ;;
            esac

            # Cleanly formats: acoustic_companion-0.1.0-linux-x86_64.AppImage
            DEST="${DIST_DIR}/acoustic_companion-${VERSION}-${SYSTEM}${SUFFIX}.${EXT}"
            cp "${SRC}" "${DEST}"
            echo "Prepared ${DEST}"
          done < <(find "${BUNDLE_DIR}" -type f \( \
            -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.msi" -o \
            -name "*setup.exe" -o -name "*.exe" -o -name "*.app.tar.gz" -o -name "*.zip" -o -name "*.pkg" \
          \) -print0)

          if [ "${FOUND}" -eq 0 ]; then
            echo "RESULT=no-bundles-found:${BUNDLE_DIR}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "RESULT=${DIST_DIR}" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Upload normalized artifacts
        if: ${{ !startsWith(steps.rename_bundles.outputs.RESULT, 'no-') }}
        uses: actions/upload-artifact@v7
        with:
          name: acoustic_companion-${{ steps.get_version.outputs.VERSION }}-${{ matrix.platform }}
          path: ${{ steps.rename_bundles.outputs.RESULT }}/*
          retention-days: 1
          # No archive: false here, allowing safe transport of multiple files

  publish-release:
    needs: build-tauri
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8 # v8 automatically unpacks the v7 artifacts
        with:
          path: artifacts
          pattern: acoustic_companion-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }} # Uses the pushed tag (e.g., v1.0.0)
          draft: true
          prerelease: false
          body: 'Automated release of Acoustic Companion app.'
          files: artifacts/*